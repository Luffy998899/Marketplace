services:
  postgres:
    image: postgres:16-alpine
    container_name: acm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acm
      POSTGRES_PASSWORD: acm
      POSTGRES_DB: acm
    ports:
      - "5432:5432"
    volumes:
      - acm_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: acm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - acm_redis:/data

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: acm-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: dev_master_key_change_me
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - acm_meili:/meili_data

  # MinIO stands in for S3 / Cloudflare R2 in local dev (signed URL support).
  minio:
    image: minio/minio:latest
    container_name: acm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - acm_minio:/data

volumes:
  acm_pg:
  acm_redis:
  acm_meili:
  acm_minio:
